name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --workspace backend ci

      - name: Install frontend dependencies
        run: npm --workspace frontend ci

      - name: Backend lint
        run: npm --workspace backend run lint

      - name: Backend unit tests
        run: npm --workspace backend run test:unit

      - name: Backend integration tests
        run: npm --workspace backend run test:integration

      - name: Frontend lint
        run: npm --workspace frontend run lint

      - name: Frontend tests
        run: npm --workspace frontend run test

      - name: Backend build
        run: npm --workspace backend run build

      - name: Frontend build
        run: npm --workspace frontend run build
