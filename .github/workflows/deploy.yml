name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  deploy-backend-railway:
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Railway secrets
        id: railway_secrets
        run: |
          if [ -z "${RAILWAY_TOKEN}" ] || [ -z "${RAILWAY_SERVICE_ID}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Railway deploy: missing RAILWAY_TOKEN or RAILWAY_SERVICE_ID"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Railway CLI
        if: steps.railway_secrets.outputs.enabled == 'true'
        run: npm i -g @railway/cli

      - name: Deploy backend to Railway
        if: steps.railway_secrets.outputs.enabled == 'true'
        run: railway up --service "$RAILWAY_SERVICE_ID" --detach
        working-directory: backend

  deploy-frontend-vercel:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Validate Vercel secrets
        id: vercel_secrets
        run: |
          if [ -z "${VERCEL_TOKEN}" ] || [ -z "${VERCEL_ORG_ID}" ] || [ -z "${VERCEL_PROJECT_ID}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Vercel deploy: missing VERCEL_TOKEN or VERCEL_ORG_ID or VERCEL_PROJECT_ID"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull Vercel environment
        if: steps.vercel_secrets.outputs.enabled == 'true'
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN
        working-directory: frontend

      - name: Build frontend
        if: steps.vercel_secrets.outputs.enabled == 'true'
        run: vercel build --prod --token=$VERCEL_TOKEN
        working-directory: frontend

      - name: Deploy frontend
        if: steps.vercel_secrets.outputs.enabled == 'true'
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
        working-directory: frontend
